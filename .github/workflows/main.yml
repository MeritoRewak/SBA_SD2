name: Engineering Check
on: [push] # The trigger: run every time code is pushed


jobs:
  run-validation:
    runs-on: ubuntu-latest # Requesting a fresh Linux VM from GitHub
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Step 1: Copy code to the VM

      - name: Setup Python
        uses: actions/setup-python@v4 # Step 2: Install Python environment
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pytest # NEW STEP: Installing the testing framework

      - name: Run Tests
        run: pytest test_logic2.py # Step 3: Use pytest to find and run tests